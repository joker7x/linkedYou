<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharma Core Image Generator</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background-color: #f0f0f0; font-family: sans-serif; }
        #canvas-container { width: 1200px; height: 630px; background: linear-gradient(135deg, #1a1f6e, #3b5dff); position: relative; overflow: hidden; color: white; display: flex; flex-direction: column; justify-content: center; padding-left: 80px; }
        .badge { background: #008080; padding: 8px 20px; border-radius: 20px; font-weight: bold; width: fit-content; font-size: 20px; margin-bottom: 20px; }
        h1 { font-size: 80px; margin: 0; }
        p { font-size: 40px; margin: 0; color: #e0e0e0; }
        .button { margin-top: 50px; background: rgba(255,255,255,0.15); border: 2px solid white; padding: 20px 40px; border-radius: 35px; width: fit-content; font-size: 30px; }
        .footer { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 20px; opacity: 0.7; }
        .decor { position: absolute; right: 100px; top: 150px; width: 300px; height: 300px; border: 2px solid rgba(255,255,255,0.1); border-radius: 50%; }
        .pill { position: absolute; right: 200px; top: 250px; width: 100px; height: 40px; background: #008080; border-radius: 20px; transform: rotate(-20deg); }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div class="badge">PHARMA CORE</div>
        <h1>تحديثات الأسعار</h1>
        <p>أحدث تغييرات أسعار الأدوية</p>
        <div class="button">افتح التطبيق وتابع أحدث التغييرات</div>
        <div class="footer">pharma-core.vercel.app</div>
        <div class="decor"></div>
        <div class="pill"></div>
    </div>
</body>
</html>
