<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b5dff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#grad)" />

  <!-- Badge -->
  <rect x="80" y="60" width="200" height="40" rx="20" fill="#008080" />
  <text x="180" y="87" font-family="sans-serif" font-size="20" fill="white" font-weight="bold" text-anchor="middle">PHARMA CORE</text>

  <!-- Left Content -->
  <text x="80" y="200" font-family="sans-serif" font-size="80" fill="white" font-weight="bold">تحديثات الأسعار</text>
  <text x="80" y="260" font-family="sans-serif" font-size="40" fill="#e0e0e0">أحدث تغييرات أسعار الأدوية</text>

  <!-- Button -->
  <rect x="80" y="480" width="500" height="70" rx="35" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2" />
  <text x="330" y="525" font-family="sans-serif" font-size="30" fill="white" text-anchor="middle">افتح التطبيق وتابع أحدث التغييرات</text>

  <!-- Decorative Pill on Right -->
  <ellipse cx="950" cy="315" rx="50" ry="20" fill="#008080" transform="rotate(-20 950 315)"/>
  <circle cx="950" cy="315" r="150" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none" />
  <circle cx="950" cy="315" r="250" stroke="rgba(255,255,255,0.05)" stroke-width="2" fill="none" />

  <!-- Footer -->
  <text x="600" y="600" font-family="sans-serif" font-size="20" fill="white" text-anchor="middle" opacity="0.7">pharma-core.vercel.app</text>
</svg>
